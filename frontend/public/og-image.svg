<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2742;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffdd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d99f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#00ffdd" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="#00d99f" opacity="0.1"/>
  <circle cx="600" cy="300" r="100" fill="#00ffdd" opacity="0.05"/>

  <!-- Main text -->
  <text x="600" y="200" font-size="72" font-weight="bold" text-anchor="middle" fill="white" font-family="JetBrains Mono, monospace">
    GemFinder
  </text>

  <!-- Subtitle -->
  <text x="600" y="280" font-size="36" text-anchor="middle" fill="#00ffdd" font-family="JetBrains Mono, monospace">
    AI-Powered GitHub Search
  </text>

  <!-- Description -->
  <text x="600" y="360" font-size="24" text-anchor="middle" fill="#cccccc" font-family="JetBrains Mono, monospace">
    Discover High-Quality Repositories
  </text>

  <!-- Features -->
  <text x="600" y="440" font-size="18" text-anchor="middle" fill="#aaaaaa" font-family="JetBrains Mono, monospace">
    💡 AI Summaries  •  🔍 Smart Search  •  📊 Hidden Gem Score
  </text>

  <!-- CTA -->
  <rect x="450" y="480" width="300" height="70" rx="10" fill="url(#accentGradient)" opacity="0.9"/>
  <text x="600" y="530" font-size="24" font-weight="bold" text-anchor="middle" fill="#0f1729" font-family="JetBrains Mono, monospace">
    Free • Open Source
  </text>

  <!-- Footer -->
  <text x="600" y="600" font-size="14" text-anchor="middle" fill="#666666" font-family="JetBrains Mono, monospace">
    roothaktivity.github.io/GemFinder
  </text>
</svg>
